<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>حساب معدل S6 - إنجليزية</title>
    <style>
        :root {
            --primary: #00897B;
            --primary-light: #e0f2f1;
            --bg-color: #f2f2f7; /* لون خلفية iOS */
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --border-color: #e5e5ea;
            --danger: #ff3b30;
            --success: #34c759;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px 100px 15px; /* 100px في الأسفل حتى لا يغطي الشريط الأزرار */
        }

        /* تنسيق الترويسة */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .personal-message {
            background: linear-gradient(135deg, #00897B, #00bfa5);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(0, 137, 123, 0.3);
            display: inline-block;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 800;
        }

        h2 {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* تنسيق النتيجة */
        #result-container {
            display: none;
            text-align: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #result-text {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 5px;
        }

        /* تنسيق بطاقات المواد */
        .module-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .module-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: left; /* جعل النص الإنجليزي من اليسار */
        }

        .coef-badge {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* تنسيق حقول الإدخال */
        .inputs-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* إذا كانت المادة بدون امتحان تأخذ الحقل عرضاً كاملاً */
        .inputs-group.single-input {
            grid-template-columns: 1fr;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-field label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-field input {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            background-color: #fafafa;
            color: var(--text-main);
            transition: 0.2s all;
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.15);
        }

        /* شريط الأزرار السفلي (زجاجي) */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            gap: 12px;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 15px); /* لدعم شاشات الآيفون الحديثة */
        }

        button {
            -webkit-appearance: none;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        .btn-calc {
            flex: 2;
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 137, 123, 0.3);
        }

        .btn-reset {
            flex: 1;
            background-color: #f2f2f7;
            color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="personal-message">دعوة لصهيب: يوفقني ربي فحياتي ونطلع 🤲🏻</div>
        <h1>حساب معدل S6 (إنجليزية)</h1>
        <h2>جامعة محمد الصديق بن يحيى - جيجل</h2>
    </div>

    <div id="result-container">
        <h2 style="color: inherit; margin: 0;">معدلك الفصلي هو</h2>
        <div id="result-text">0.00</div>
    </div>

    <div id="modules-container"></div>

    <div class="bottom-bar">
        <button class="btn-reset" onclick="resetFields()">مسح</button>
        <button class="btn-calc" onclick="calculateAverage()">احسب المعدل</button>
    </div>

<script>
    const modules = [
        { id: 'ling', name: 'Linguistique 2', coef: 2, hasExam: true },
        { id: 'litt', name: 'Littérature 2', coef: 2, hasExam: true },
        { id: 'civ', name: 'Civilisation 2', coef: 2, hasExam: true },
        { id: 'trad', name: 'Traduction 2', coef: 2, hasExam: true },
        { id: 'didact', name: 'Didactique 2', coef: 2, hasExam: true },
        { id: 'metho', name: 'Méthodologie 2', coef: 2, hasExam: true },
        { id: 'lang', name: 'Langues de spécialités 2', coef: 1, hasExam: true },
        { id: 'atelier', name: 'Atelier de lecture/écriture', coef: 2, hasExam: false }, 
        { id: 'prat', name: 'Communication orale', coef: 1, hasExam: false }, 
        { id: 'entre', name: 'Entreprenariat', coef: 1, hasExam: false } 
    ];

    const container = document.getElementById('modules-container');

    modules.forEach(mod => {
        // تحديد هل هي مادة بامتحان أم تقويم فقط لضبط التصميم (Grid)
        const gridClass = mod.hasExam ? 'inputs-group' : 'inputs-group single-input';
        
        let inputsHtml = `<div class="${gridClass}">`;
        
        inputsHtml += `
            <div class="input-field">
                <label>التقويم ${mod.hasExam ? '40%' : '100%'}</label>
                <input type="text" inputmode="decimal" id="td_${mod.id}" placeholder="0.00">
            </div>
        `;

        if (mod.hasExam) {
            inputsHtml += `
                <div class="input-field">
                    <label>الامتحان 60%</label>
                    <input type="text" inputmode="decimal" id="exam_${mod.id}" placeholder="0.00">
                </div>
            `;
        }

        inputsHtml += `</div>`;

        const card = document.createElement('div');
        card.className = 'module-card';
        card.innerHTML = `
            <div class="module-header">
                <span class="coef-badge">معامل ${mod.coef}</span>
                <span class="module-title" dir="ltr">${mod.name}</span>
            </div>
            ${inputsHtml}
        `;
        container.appendChild(card);
    });

    function parseGrade(val) {
        if (!val) return 0;
        let parsed = parseFloat(val.replace(',', '.'));
        return isNaN(parsed) ? 0 : parsed;
    }

    function calculateAverage() {
        let totalScore = 0;
        let totalCoef = 0;

        for (let mod of modules) {
            let tdInput = document.getElementById(`td_${mod.id}`);
            let examInput = document.getElementById(`exam_${mod.id}`);

            let tdVal = parseGrade(tdInput ? tdInput.value : "");
            let examVal = parseGrade(examInput ? examInput.value : "");

            let moduleAverage = 0;

            if (mod.hasExam) {
                moduleAverage = (examVal * 0.6) + (tdVal * 0.4);
            } else {
                moduleAverage = tdVal;
            }

            totalScore += (moduleAverage * mod.coef);
            totalCoef += mod.coef;
        }

        let finalAverage = totalScore / totalCoef;

        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        
        resultText.innerText = finalAverage.toFixed(2);
        
        // تلوين النتيجة حسب النجاح أو الرسوب
        if (finalAverage >= 10) {
            resultContainer.style.border = "2px solid var(--success)";
            resultContainer.style.backgroundColor = "#eaffef";
            resultText.style.color = "var(--success)";
        } else {
            resultContainer.style.border = "2px solid var(--danger)";
            resultContainer.style.backgroundColor = "#ffebee";
            resultText.style.color = "var(--danger)";
        }
        
        resultContainer.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFields() {
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => input.value = '');
        document.getElementById('result-container').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
